<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Robot Body -->
  <rect x="20" y="30" width="40" height="35" rx="5" fill="#4a6cfa" />
  
  <!-- Robot Head -->
  <rect x="30" y="15" width="20" height="15" rx="3" fill="#4a6cfa" />
  
  <!-- Neck Connection -->
  <rect x="35" y="30" width="10" height="5" fill="#4a6cfa" />
  
  <!-- Eyes -->
  <circle cx="35" cy="22" r="3" fill="#ffffff" />
  <circle cx="45" cy="22" r="3" fill="#ffffff" />
  
  <!-- Mouth -->
  <rect x="32" y="27" width="16" height="2" rx="1" fill="#ffffff" />
  
  <!-- Antenna -->
  <line x1="40" y1="15" x2="40" y2="5" stroke="#4a6cfa" stroke-width="2" />
  <circle cx="40" cy="5" r="3" fill="#ff0000" />
  
  <!-- Arms -->
  <rect x="10" y="35" width="10" height="5" rx="2" fill="#4a6cfa" />
  <rect x="60" y="35" width="10" height="5" rx="2" fill="#4a6cfa" />
  
  <!-- Legs -->
  <rect x="25" y="65" width="10" height="10" rx="2" fill="#4a6cfa" />
  <rect x="45" y="65" width="10" height="10" rx="2" fill="#4a6cfa" />
  
  <!-- Panel Details -->
  <rect x="30" y="40" width="20" height="15" rx="2" fill="#34c3ff" />
  <circle cx="35" cy="45" r="2" fill="#ffffff" />
  <circle cx="45" cy="45" r="2" fill="#ffffff" />
  <rect x="32" y="50" width="16" height="2" rx="1" fill="#ffffff" />
</svg>
